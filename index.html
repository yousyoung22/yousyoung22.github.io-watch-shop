<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LUXE JEWELRY</title>

<link rel="stylesheet" href="css/style.css">
</head>

<body>

<header>
    <div class="logo">LUXE JEWELRY</div>

    <nav>
        <a href="#home">HOME</a>
        <a href="#products">COLLECTION</a>
        <a href="#about">BRAND</a>
        <a href="#help">HELP</a>
        <a href="#payment">PAYMENT</a>

        <div id="cart-btn">🛒 <span id="cart-count">0</span></div>
    </nav>
</header>

<!-- HOME -->
<section id="home" class="section home">
    <h1>Luxury Jewelry</h1>
    <p>World Class Premium Collection</p>
</section>

<!-- PRODUCTS -->
<section id="products" class="section">
    <h2>COLLECTION</h2>
    <div id="product-grid"></div>
</section>

<!-- BRAND -->
<section id="about" class="section">
    <h2>BRAND STORY</h2>
    <p>최고급 다이아몬드와 장인의 기술로 완성된 럭셔리 컬렉션</p>
</section>

<!-- HELP -->
<section id="help" class="section">
    <h2>CUSTOMER SERVICE</h2>
    <p>1588-0000 (09:00 - 18:00)</p>
</section>

<!-- PAYMENT -->
<section id="payment" class="section">
    <h2>PAYMENT METHOD</h2>
    <p>카드 / 계좌이체 / 간편결제</p>
</section>

<!-- CART -->
<div id="cart-panel">
    <div class="cart-header">
        <h3>장바구니</h3>
        <button onclick="closeCart()">✕</button>
    </div>

    <div id="cart-items"></div>

    <div class="cart-footer">
        <p>총액: <span id="total">0</span>원</p>
        <button onclick="buy()">구매하기</button>
        <button onclick="clearCart()">전체삭제</button>
    </div>
</div>

<script src="js/app.js"></script>
</body>
</html>
