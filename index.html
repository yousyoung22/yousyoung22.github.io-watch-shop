<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>대호 쥬얼리</title>

<link rel="stylesheet" href="css/style.css">
</head>

<body>

<!-- HEADER -->
<header>
    <div class="logo">
        <img src="images/logo.png" alt="logo">
        <span>대호 쥬얼리</span>
    </div>

    <nav>
        <a href="#home">HOME</a>
        <a href="#products">COLLECTION</a>
        <a href="#about">BRAND</a>
        <a href="#help">HELP</a>
        <a href="#payment">PAYMENT</a>

        <div id="cart-btn">🛒 <span id="cart-count">0</span></div>
    </nav>
</header>

<!-- HOME -->
<section id="home" class="section home">
    <div class="hero-text">
        <h1>DAEHO JEWELRY</h1>
        <p>Luxury Handmade Collection</p>
    </div>
</section>

<!-- PRODUCTS -->
<section id="products" class="section">
    <h2>COLLECTION</h2>
    <div id="product-grid"></div>
</section>

<!-- BRAND -->
<section id="about" class="section">
    <h2>BRAND</h2>
    <p>최고급 주얼리 컬렉션 대호 쥬얼리</p>
</section>

<!-- HELP -->
<section id="help" class="section">
    <h2>HELP</h2>
    <p>고객센터 1588-0000</p>
</section>

<!-- PAYMENT -->
<section id="payment" class="section">
    <h2>PAYMENT</h2>
    <p>카드 / 계좌이체 / 간편결제</p>
</section>

<!-- CART -->
<div id="cart-panel">
    <div class="cart-header">
        <h3>장바구니</h3>
        <button onclick="closeCart()">✕</button>
    </div>

    <div id="cart-items"></div>

    <div class="cart-footer">
        <p>총액: <span id="total">0</span>원</p>
        <button onclick="buy()">구매하기</button>
        <button onclick="clearCart()">전체삭제</button>
    </div>
</div>

<script src="js/app.js"></script>

</body>
</html>
