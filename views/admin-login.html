<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SEOUL ICE 관리자 로그인</title>
<style>
    :root{
        --bg:#f4f6f8;
        --paper:#ffffff;
        --text:#101828;
        --muted:#667085;
        --line:#d0d5dd;
        --button:#111318;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{
        min-height:100vh;
        display:grid;
        place-items:center;
        padding:24px;
        background:linear-gradient(180deg,#ffffff,#eef1f4);
        color:var(--text);
        font-family:Inter,Pretendard,"Noto Sans KR",Arial,sans-serif;
    }
    .login-box{
        width:min(420px,100%);
        padding:30px;
        border:1px solid rgba(16,24,40,.12);
        border-radius:12px;
        background:var(--paper);
        box-shadow:0 22px 70px rgba(16,24,40,.12);
    }
    .eyebrow{
        color:#5b4b5f;
        font-size:.72rem;
        font-weight:900;
        letter-spacing:.16em;
        text-transform:uppercase;
    }
    h1{
        margin-top:10px;
        font-size:1.8rem;
        line-height:1.15;
    }
    p{
        margin-top:10px;
        color:var(--muted);
        line-height:1.6;
        font-size:.94rem;
    }
    form{
        display:grid;
        gap:14px;
        margin-top:24px;
    }
    label{
        display:grid;
        gap:7px;
        color:#344054;
        font-size:.82rem;
        font-weight:900;
    }
    input{
        width:100%;
        height:44px;
        padding:0 12px;
        border:1px solid var(--line);
        border-radius:8px;
        color:var(--text);
        font:inherit;
    }
    button{
        height:46px;
        border:none;
        border-radius:8px;
        background:linear-gradient(135deg,#111318,#343a46);
        color:#fff;
        font:inherit;
        font-weight:900;
        cursor:pointer;
    }
    .status{
        min-height:22px;
        margin-top:14px;
        color:#b42318;
        font-size:.85rem;
        font-weight:800;
    }
    .home-link{
        display:inline-block;
        margin-top:16px;
        color:#475467;
        font-size:.86rem;
        font-weight:900;
    }
</style>
</head>
<body>
<main class="login-box">
    <div class="eyebrow">SEOUL ICE ADMIN</div>
    <h1>관리자 로그인</h1>
    <p>상품 추가, 수정, 삭제와 주문 확인은 관리자만 사용할 수 있습니다.</p>

    <form id="login-form">
        <label>
            아이디
            <input id="username" name="username" autocomplete="username" value="seoulice" required>
        </label>
        <label>
            비밀번호
            <input id="password" name="password" type="password" autocomplete="current-password" required>
        </label>
        <button type="submit">로그인</button>
    </form>

    <div id="status" class="status"></div>
    <a class="home-link" href="/">사이트로 돌아가기</a>
</main>

<script>
const form = document.getElementById("login-form");
const statusEl = document.getElementById("status");

form.addEventListener("submit", async event => {
    event.preventDefault();
    statusEl.textContent = "";

    const response = await fetch("/api/admin/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            username: document.getElementById("username").value,
            password: document.getElementById("password").value
        })
    });

    const data = await response.json();
    if(!response.ok){
        statusEl.textContent = data.error || "로그인에 실패했습니다.";
        return;
    }

    location.href = "/admin";
});
</script>
</body>
</html>
