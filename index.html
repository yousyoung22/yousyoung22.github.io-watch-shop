<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LUXE JEWELRY</title>

<link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="company-nam">
        대호 쥬얼리
    </div>

    <!-- CENTER: 로고 -->
    <div class="center-logo">
        <img src="images/logo.png" alt="logo">
    </div>

    <!-- RIGHT: 메뉴 -->
    <nav>
        <a href="#home">HOME</a>
        <a href="#products">COLLECTION</a>
        <a href="#about">BRAND</a>
        <a href="#help">HELP</a>
        <a href="#payment">PAYMENT</a>

        <div id="cart-btn">🛒 <span id="cart-count">0</span></div>
    </nav>

</header>
</header>

<!-- HOME -->
<section id="home" class="hero">
    <div class="hero-overlay"></div>

    <div class="hero-content">
        <h1>대호 쥬얼리</h1>
        <p>Handcrafted Premium Collection</p>
        <button onclick="location.href='#products'">SHOP NOW</button>
    </div>
</section>

<!-- PRODUCTS -->
<section id="products" class="section">
    <h2>COLLECTION</h2>
    <div id="product-grid"></div>
</section>

<!-- BRAND -->
<section id="about" class="section">
    <h2>BRAND STORY</h2>
    <p>Luxury handmade jewelry collection</p>
</section>

<!-- HELP -->
<section id="help" class="section">
    <h2>CUSTOMER SERVICE</h2>
    <p>1588-0000</p>
</section>

<!-- PAYMENT -->
<section id="payment" class="section">
    <h2>PAYMENT</h2>
    <p>Card / Bank / Pay</p>
</section>

<!-- CART -->
<div id="cart-panel">
    <div class="cart-header">
        <h3>Cart</h3>
        <button onclick="closeCart()">✕</button>
    </div>

    <div id="cart-items"></div>

    <div class="cart-footer">
        <p>Total: <span id="total">0</span></p>
        <button onclick="buy()">구매</button>
        <button onclick="clearCart()">취소</button>
    </div>
</div>

<script src="js/app.js"></script>

</body>
</html>
