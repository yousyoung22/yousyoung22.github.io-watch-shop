<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SEOUL ICE 전체 주문</title>
<style>
    :root{--bg:#f6f7f9;--paper:#fff;--text:#101828;--muted:#667085;--line:#d0d5dd;--line2:#eaecf0;--dark:#111318;--accent:#27465f;--accent2:#38c172;--price:#3f4a5a}
    *{box-sizing:border-box;margin:0;padding:0}
    body{min-height:100vh;background:linear-gradient(180deg,#fff,#eef1f4);color:var(--text);font-family:Inter,Pretendard,"Noto Sans KR",Arial,sans-serif}
    a{color:inherit;text-decoration:none}
    .header{position:sticky;top:0;z-index:10;display:flex;align-items:center;justify-content:space-between;gap:16px;min-height:72px;padding:0 28px;background:rgba(255,255,255,.9);border-bottom:1px solid var(--line2);backdrop-filter:blur(18px)}
    .brand{display:flex;align-items:center;gap:12px;font-size:.9rem;font-weight:900;letter-spacing:.1em}
    .brand img{width:40px;height:40px;border-radius:9px;object-fit:cover;box-shadow:0 8px 24px rgba(16,24,40,.12)}
    .back{min-height:40px;display:flex;align-items:center;padding:0 14px;border:1px solid var(--line);border-radius:999px;background:#fff;color:#344054;font-size:.78rem;font-weight:900}
    main{width:min(980px,calc(100% - 40px));margin:0 auto;padding:40px 0 60px}
    .head{margin-bottom:20px;padding:26px;border:1px solid var(--line2);border-radius:12px;background:#fff;box-shadow:0 18px 55px rgba(16,24,40,.08)}
    .eyebrow{color:#5b4b5f;font-size:.72rem;font-weight:900;letter-spacing:.16em;text-transform:uppercase}
    h1{margin-top:10px;font-size:2rem}
    .sub{margin-top:10px;color:var(--muted);line-height:1.7}
    .list{display:grid;gap:12px}
    .order-card{display:grid;gap:14px;padding:16px;border:1px solid var(--line2);border-radius:10px;background:#fff}
    .order-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
    .order-title{display:flex;align-items:center;gap:8px;flex-wrap:wrap;font-weight:900}
    .badge{min-height:24px;display:inline-flex;align-items:center;padding:0 9px;border-radius:999px;background:#111318;color:#fff;font-size:.7rem;font-weight:900}
    .badge.cancel{background:#98a2b3}
    .meta{margin-top:6px;color:var(--muted);font-size:.84rem;line-height:1.55}
    .price{color:var(--price);font-weight:900;white-space:nowrap}
    .items{display:grid;gap:9px}
    .item{display:grid;grid-template-columns:64px 1fr;gap:11px;align-items:center;padding:10px;border:1px solid var(--line2);border-radius:8px;background:linear-gradient(180deg,#fbfcfd,#f4f6f8)}
    .item img{width:64px;height:64px;border-radius:8px;object-fit:cover;background:#edf2f7}
    .item strong{display:block;font-size:.9rem;line-height:1.35}
    .item span{display:block;margin-top:4px;color:var(--muted);font-size:.8rem;font-weight:800}
    .delivery-flow{padding:16px;border-radius:10px;background:var(--accent);color:#fff}
    .delivery-line{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;position:relative}
    .delivery-step{display:grid;justify-items:center;gap:7px;position:relative;z-index:1;min-width:0}
    .delivery-step:not(:last-child)::after{content:"";position:absolute;top:14px;left:calc(50% + 16px);width:calc(100% - 24px);height:4px;border-radius:999px;background:rgba(255,255,255,.24)}
    .delivery-step.done:not(:last-child)::after{background:var(--accent2)}
    .dot{width:30px;height:30px;display:grid;place-items:center;border-radius:999px;background:rgba(255,255,255,.9);color:#9aa4b2;font-size:.86rem;font-weight:900}
    .delivery-step.done .dot{background:var(--accent2);color:#fff}
    .delivery-step span{color:rgba(255,255,255,.78);font-size:.72rem;font-weight:900;text-align:center;word-break:keep-all}
    .delivery-step.done span{color:#fff}
    .tracking{display:grid;gap:3px;padding:11px 12px;border:1px solid var(--line2);border-radius:8px;background:#f8fafc;color:#3f4a5a;font-size:.82rem;font-weight:800;line-height:1.55}
    .tracking strong{color:#101828;font-size:.8rem}
    .tracking span{display:block}
    .empty{padding:30px;border:1px dashed var(--line);border-radius:10px;background:#fff;color:var(--muted);text-align:center}
    @media(max-width:620px){.header{padding:0 16px}main{width:calc(100% - 28px);padding-top:26px}.order-top{display:grid}.price{white-space:normal}.delivery-flow{padding:13px 10px}.delivery-line{gap:4px}.delivery-step:not(:last-child)::after{left:calc(50% + 14px);width:calc(100% - 20px)}.dot{width:28px;height:28px}.delivery-step span{font-size:.66rem}h1{font-size:1.75rem}}
</style>
</head>
<body>
<header class="header">
    <a class="brand" href="/">
        <img src="/images/logo.png" alt="SEOUL ICE">
        <span>SEOUL ICE</span>
    </a>
    <a class="back" href="/mypage">마이페이지</a>
</header>
<main>
    <section class="head">
        <p class="eyebrow">All orders</p>
        <h1>전체 주문내역</h1>
        <p class="sub">취소 주문까지 포함해 최신 시간순으로 정리했습니다.</p>
    </section>
    <div id="orders" class="list"></div>
</main>
<script>
const money = price => "₩" + Number(price || 0).toLocaleString("ko-KR");
const stages = ["결제완료","상품준비중","배송시작","배송중","배송완료"];
function escapeHtml(value){return String(value ?? "").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;")}
function imageSrc(value){return "/" + String(value || "images/logo.png").replace(/^\/+/,"")}
function normalizeStatus(value){
    const raw = String(value || "주문 처리중").trim();
    const normalized = raw.replace(/\s+/g,"");
    if(normalized === "주문완료" || normalized === "배송완료") return "배송완료";
    if(normalized === "상품준비중") return "상품 준비중";
    if(normalized === "결제완료") return "결제 완료";
    if(normalized === "결제대기중") return "주문 처리중";
    if(normalized === "주문접수") return "주문 처리중";
    return raw;
}
function statusRank(status){return ["주문 처리중","결제 완료","상품 준비중","배송시작","배송중","배송완료"].indexOf(status)}
function canonicalStatus(order){
    const status = normalizeStatus(order.status);
    const shippingStatus = normalizeStatus(order.shippingStatus);
    if(status === "취소" || shippingStatus === "취소") return "취소";
    return statusRank(shippingStatus) > statusRank(status) ? shippingStatus : status;
}
function displayStatus(order){
    const status = canonicalStatus(order);
    if(status === "취소") return "결제 취소";
    return status === "주문 처리중" ? "결제 대기중" : status;
}
function stageIndex(order){
    const status = canonicalStatus(order);
    if(status === "주문 처리중") return -1;
    if(status === "배송완료") return 4;
    if(status === "배송중") return 3;
    if(status === "배송시작") return 2;
    if(status === "상품 준비중") return 1;
    return 0;
}
function deliveryFlow(order){
    if(canonicalStatus(order) === "취소") return "";
    const activeIndex = stageIndex(order);
    return `<div class="delivery-flow"><div class="delivery-line">
        ${stages.map((label, index) => `<div class="delivery-step ${index <= activeIndex ? "done" : ""}"><div class="dot">${index <= activeIndex ? "✓" : index + 1}</div><span>${label}</span></div>`).join("")}
    </div></div>`;
}
function itemList(order){
    return (order.items || []).map(item => `<div class="item">
        <img src="${escapeHtml(imageSrc(item.image))}" alt="">
        <div>
            <strong>${escapeHtml(item.name || "상품")}</strong>
            <span>${escapeHtml(item.selectedOption ? `${item.optionName || "옵션"}: ${item.selectedOption}` : "기본 옵션")}</span>
        </div>
    </div>`).join("");
}
function trackingText(order){
    if(canonicalStatus(order) === "취소") return `<strong>현재 현황</strong><span>결제 취소 처리되었습니다.</span>`;
    if(canonicalStatus(order) === "주문 처리중") return `<strong>현재 현황</strong><span>결제 확인 대기중입니다.</span>`;
    if(order.trackingLastDescription || order.trackingLastText){
        const main = order.trackingLastDescription || order.trackingLastText;
        const sub = [
            order.trackingLastLocation ? `위치 ${order.trackingLastLocation}` : "",
            order.trackingLastTime ? `시간 ${order.trackingLastTime}` : "",
            order.trackingEta ? `예상 도착 ${order.trackingEta}` : ""
        ].filter(Boolean).join(" · ");
        return `<strong>현재 현황</strong><span>${escapeHtml(main)}</span>${sub ? `<span>${escapeHtml(sub)}</span>` : ""}`;
    }
    if(order.trackingSyncError) return `<strong>현재 현황</strong><span>${escapeHtml(order.trackingSyncError)}</span>`;
    if(order.trackingNumber) return `<strong>현재 현황</strong><span>${escapeHtml(order.carrierName || order.carrierId)} ${escapeHtml(order.trackingNumber)}</span>`;
    return `<strong>현재 현황</strong><span>운송장번호 등록 전입니다.</span>`;
}
function card(order){
    const status = displayStatus(order);
    const isCancel = status === "취소";
    return `<article class="order-card">
        <div class="order-top">
            <div>
                <div class="order-title">${escapeHtml(order.id)} <span class="badge ${isCancel ? "cancel" : ""}">${escapeHtml(status)}</span></div>
                <div class="meta">${new Date(order.createdAt).toLocaleString("ko-KR")}</div>
            </div>
            <div class="price">${money(order.total)}</div>
        </div>
        ${deliveryFlow(order)}
        <div class="tracking">${trackingText(order)}</div>
        <div class="items">${itemList(order)}</div>
    </article>`;
}
async function load(){
    const response = await fetch("/api/my-orders");
    const data = await response.json();
    if(!response.ok) throw new Error(data.error || "주문내역을 불러오지 못했습니다.");
    const orders = (data || []).sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt));
    document.getElementById("orders").innerHTML = orders.length ? orders.map(card).join("") : `<div class="empty">주문내역이 없습니다.</div>`;
}
load().catch(error => {
    document.getElementById("orders").innerHTML = `<div class="empty">${escapeHtml(error.message)}</div>`;
});
</script>
</body>
</html>
