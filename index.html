<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>대호 쥬얼리</title>

<link rel="stylesheet" href="css/style.css">
</head>

<body>

<header>

    <div class="logo">
        <img src="images/logo.png">
        <span>대호 쥬얼리</span>
    </div>

    <div class="mobile-icons">
        <div id="cart-btn">🛒 <span id="cart-count">0</span></div>
        <div class="menu-toggle" onclick="toggleMenu()">☰</div>
    </div>

    <nav id="nav-menu">
        <a href="#home">HOME</a>
        <a href="#products">COLLECTION</a>
        <a href="#about">BRAND</a>
        <a href="#help">HELP</a>
        <a href="#payment">PAYMENT</a>
    </nav>

</header>

<section id="home" class="section">
    <h1>DAEHO JEWELRY</h1>
    <p class="sub">Luxury Handmade Collection</p>
</section>

<section id="products" class="section">
    <h2>COLLECTION</h2>
    <div id="product-grid"></div>
</section>

<section id="about" class="section">
    <h2>BRAND</h2>
    <p class="sub">대호 쥬얼리 프리미엄 브랜드</p>
</section>

<section id="help" class="section">
    <h2>HELP</h2>
    <p class="sub">고객센터 1588-0000</p>
</section>

<section id="payment" class="section">
    <h2>PAYMENT</h2>
    <p class="sub">카드 / 계좌이체 / 간편결제</p>
</section>

<!-- CART -->
<div id="cart-panel">

    <div id="cart-items"></div>

    <div class="cart-footer">

        <p class="total-text">
            총 결제금액<br>
            <span id="total">₩0</span>
        </p>

        <div class="cart-bottom-buttons">
            <button class="buy-btn" onclick="buy()">구매하기</button>
            <button class="back-btn" onclick="closeCart()">뒤로가기</button>
        </div>

    </div>

</div>

<div id="backdrop" onclick="closeCart()"></div>

<script src="js/app.js"></script>

</body>
</html>
