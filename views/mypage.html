<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SEOUL ICE 마이페이지</title>
<style>
    :root{
        --bg:#f6f7f9;
        --paper:#ffffff;
        --text:#101828;
        --muted:#667085;
        --line:#d0d5dd;
        --line2:#eaecf0;
        --dark:#111318;
        --accent:#27465f;
        --accent2:#38c172;
        --price:#3f4a5a;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{
        min-height:100vh;
        background:
            radial-gradient(circle at top right,rgba(39,70,95,.12),transparent 34%),
            linear-gradient(180deg,#ffffff,#eef1f4);
        color:var(--text);
        font-family:Inter,Pretendard,"Noto Sans KR",Arial,sans-serif;
    }
    a{color:inherit;text-decoration:none}
    button,input{font:inherit}
    .header{
        position:sticky;
        top:0;
        z-index:10;
        display:flex;
        align-items:center;
        justify-content:space-between;
        gap:16px;
        min-height:72px;
        padding:0 28px;
        background:rgba(255,255,255,.9);
        border-bottom:1px solid var(--line2);
        backdrop-filter:blur(18px);
    }
    .brand{
        display:flex;
        align-items:center;
        gap:12px;
        font-size:.9rem;
        font-weight:900;
        letter-spacing:.1em;
    }
    .brand img{
        width:40px;
        height:40px;
        border-radius:9px;
        object-fit:cover;
        box-shadow:0 8px 24px rgba(16,24,40,.12);
    }
    .header-actions{display:flex;gap:10px}
    .header-actions a{
        min-height:40px;
        display:flex;
        align-items:center;
        padding:0 14px;
        border:1px solid var(--line);
        border-radius:999px;
        background:#fff;
        color:#344054;
        font-size:.78rem;
        font-weight:900;
    }
    .shell{
        width:min(1160px,calc(100% - 40px));
        margin:0 auto;
        padding:42px 0 60px;
    }
    .hero{
        display:grid;
        grid-template-columns:minmax(0,1fr) 320px;
        gap:20px;
        align-items:stretch;
        margin-bottom:20px;
    }
    .hero-main,
    .summary-card,
    .panel{
        border:1px solid var(--line2);
        border-radius:12px;
        background:rgba(255,255,255,.95);
        box-shadow:0 18px 55px rgba(16,24,40,.08);
    }
    .hero-main{
        position:relative;
        display:grid;
        align-content:space-between;
        min-height:166px;
        padding:24px;
        overflow:hidden;
        border:0;
        background:
            linear-gradient(135deg,rgba(17,19,24,.96),rgba(39,70,95,.94)),
            #111318;
        color:#fff;
    }
    .hero-main::after{
        content:"";
        position:absolute;
        right:-80px;
        bottom:-120px;
        width:280px;
        height:280px;
        border-radius:50%;
        border:1px solid rgba(255,255,255,.14);
    }
    .eyebrow{
        color:#5b4b5f;
        font-size:.72rem;
        font-weight:900;
        letter-spacing:.16em;
        text-transform:uppercase;
    }
    .hero-main .eyebrow{
        color:rgba(255,255,255,.68);
    }
    h1{
        margin-top:10px;
        font-size:1.75rem;
        line-height:1.15;
        letter-spacing:0;
    }
    .sub{
        margin-top:12px;
        color:var(--muted);
        line-height:1.7;
        word-break:keep-all;
    }
    .summary-card{
        display:grid;
        grid-template-columns:1fr 1fr;
        gap:10px;
        padding:18px;
    }
    .mini-stat{
        padding:15px;
        border-radius:10px;
        background:#f8fafc;
    }
    .mini-stat span{
        color:var(--muted);
        font-size:.76rem;
        font-weight:900;
    }
    .mini-stat strong{
        display:block;
        margin-top:8px;
        font-size:1.4rem;
    }
    .hero-actions{
        display:flex;
        justify-content:space-between;
        gap:12px;
        margin-top:24px;
        position:relative;
        z-index:1;
    }
    .hero-actions .secondary,
    .hero-actions .hero-logout{
        min-width:96px;
        min-height:38px;
        border-radius:999px;
        font-size:.78rem;
    }
    .hero-actions .secondary{
        border-color:rgba(255,255,255,.42);
        background:#fff;
        color:#111318;
    }
    .hero-logout{
        display:inline-flex;
        align-items:center;
        justify-content:center;
        padding:0 13px;
        border:1px solid rgba(255,255,255,.28);
        background:rgba(255,255,255,.08);
        color:#fff;
        font-weight:900;
        cursor:pointer;
    }
    .orders-grid{
        display:grid;
        grid-template-columns:repeat(2,minmax(0,1fr));
        gap:20px;
        align-items:start;
    }
    .panel-head{
        display:flex;
        align-items:center;
        justify-content:space-between;
        gap:12px;
        padding:18px 20px;
        border-bottom:1px solid var(--line2);
    }
    .panel-head h2{font-size:1.08rem}
    .panel-body{padding:20px}
    form{display:grid;gap:13px}
    label{
        display:grid;
        gap:7px;
        color:#344054;
        font-size:.82rem;
        font-weight:900;
    }
    input{
        width:100%;
        height:44px;
        padding:0 12px;
        border:1px solid var(--line);
        border-radius:8px;
        background:#fff;
        color:var(--text);
    }
    .primary{
        min-height:44px;
        border:none;
        border-radius:8px;
        background:linear-gradient(135deg,#111318,#343a46);
        color:#fff;
        font-weight:900;
        cursor:pointer;
    }
    .secondary{
        min-height:40px;
        display:inline-flex;
        align-items:center;
        justify-content:center;
        padding:0 13px;
        border:1px solid var(--line);
        border-radius:8px;
        background:#fff;
        color:#344054;
        font-size:.82rem;
        font-weight:900;
        cursor:pointer;
    }
    .status{
        min-height:22px;
        margin-top:12px;
        color:#3f4a5a;
        font-size:.84rem;
        font-weight:900;
    }
    .stack{display:grid;gap:12px}
    .order-card{
        display:grid;
        gap:14px;
        padding:15px;
        border:1px solid var(--line2);
        border-radius:10px;
        background:#fff;
    }
    .order-top{
        display:flex;
        align-items:flex-start;
        justify-content:space-between;
        gap:12px;
    }
    .order-title{
        display:flex;
        align-items:center;
        gap:8px;
        flex-wrap:wrap;
        font-weight:900;
    }
    .badge{
        min-height:24px;
        display:inline-flex;
        align-items:center;
        padding:0 9px;
        border-radius:999px;
        background:#111318;
        color:#fff;
        font-size:.7rem;
        font-weight:900;
    }
    .order-meta{
        margin-top:6px;
        color:var(--muted);
        font-size:.84rem;
        line-height:1.55;
    }
    .order-price{
        color:var(--price);
        font-weight:900;
        white-space:nowrap;
    }
    .order-items{
        display:grid;
        gap:9px;
    }
    .order-item{
        display:grid;
        grid-template-columns:64px 1fr;
        gap:11px;
        align-items:center;
        padding:10px;
        border:1px solid var(--line2);
        border-radius:8px;
        background:linear-gradient(180deg,#fbfcfd,#f4f6f8);
    }
    .order-item img{
        width:64px;
        height:64px;
        border-radius:8px;
        object-fit:cover;
        background:#edf2f7;
    }
    .item-name{
        font-size:.9rem;
        font-weight:900;
        line-height:1.35;
    }
    .item-option{
        margin-top:4px;
        color:var(--muted);
        font-size:.8rem;
        font-weight:800;
    }
    .delivery-flow{
        padding:16px;
        border-radius:10px;
        background:var(--accent);
        color:#fff;
    }
    .delivery-line{
        display:grid;
        grid-template-columns:repeat(5,1fr);
        gap:8px;
        position:relative;
    }
    .delivery-step{
        display:grid;
        justify-items:center;
        gap:7px;
        position:relative;
        z-index:1;
        min-width:0;
    }
    .delivery-step:not(:last-child)::after{
        content:"";
        position:absolute;
        top:14px;
        left:calc(50% + 16px);
        width:calc(100% - 24px);
        height:4px;
        border-radius:999px;
        background:rgba(255,255,255,.24);
    }
    .delivery-step.done:not(:last-child)::after{background:var(--accent2)}
    .dot{
        width:30px;
        height:30px;
        display:grid;
        place-items:center;
        border-radius:999px;
        background:rgba(255,255,255,.9);
        color:#9aa4b2;
        font-size:.86rem;
        font-weight:900;
    }
    .delivery-step.done .dot{
        background:var(--accent2);
        color:#fff;
    }
    .delivery-step span{
        color:rgba(255,255,255,.78);
        font-size:.72rem;
        font-weight:900;
        text-align:center;
        word-break:keep-all;
    }
    .delivery-step.done span{color:#fff}
    .cancelled-flow{
        padding:12px;
        border:1px solid var(--line2);
        border-radius:10px;
        background:#f2f4f7;
        color:#667085;
        font-size:.82rem;
        font-weight:900;
        text-align:center;
    }
    .tracking{
        display:grid;
        gap:3px;
        padding:11px 12px;
        border:1px solid var(--line2);
        border-radius:8px;
        background:#f8fafc;
        color:#3f4a5a;
        font-size:.82rem;
        font-weight:800;
        line-height:1.55;
    }
    .tracking strong{
        color:#101828;
        font-size:.8rem;
    }
    .tracking span{
        display:block;
    }
    .empty{
        padding:26px;
        border:1px dashed var(--line);
        border-radius:10px;
        background:#fff;
        color:var(--muted);
        text-align:center;
    }
    .logout-row{
        margin-top:22px;
        text-align:center;
    }
    .logout{
        min-height:36px;
        padding:0 12px;
        border:1px solid var(--line);
        border-radius:8px;
        background:#fff;
        color:#667085;
        font-size:.8rem;
        font-weight:900;
        cursor:pointer;
    }
    .profile-modal{
        position:fixed;
        inset:0;
        z-index:40;
        display:none;
        place-items:center;
        padding:20px;
        background:rgba(16,24,40,.42);
        backdrop-filter:blur(10px);
    }
    .profile-modal.active{
        display:grid;
    }
    .profile-dialog{
        width:min(480px,100%);
        border:1px solid var(--line2);
        border-radius:12px;
        background:#fff;
        box-shadow:0 24px 70px rgba(16,24,40,.24);
    }
    .profile-dialog-head{
        display:flex;
        align-items:center;
        justify-content:space-between;
        gap:12px;
        padding:18px 20px;
        border-bottom:1px solid var(--line2);
    }
    .profile-dialog-head h2{
        font-size:1.05rem;
    }
    .profile-close{
        width:36px;
        height:36px;
        border:1px solid var(--line);
        border-radius:8px;
        background:#fff;
        color:#344054;
        font-size:1.1rem;
        font-weight:900;
        cursor:pointer;
    }
    .profile-dialog-body{
        padding:20px;
    }
    .modal-actions{
        display:grid;
        grid-template-columns:1fr 1fr;
        gap:10px;
    }
    @media(max-width:860px){
        .header{padding:0 16px}
        .shell{width:calc(100% - 28px);padding-top:26px}
        .hero,.orders-grid{grid-template-columns:1fr}
    }
    @media(max-width:560px){
        .summary-card{grid-template-columns:1fr 1fr}
        .order-top{display:grid}
        .order-price{white-space:normal}
        .delivery-flow{padding:13px 10px}
        .delivery-line{gap:4px}
        .delivery-step:not(:last-child)::after{
            left:calc(50% + 14px);
            width:calc(100% - 20px);
        }
        .dot{width:28px;height:28px}
        .delivery-step span{font-size:.66rem}
        h1{font-size:1.8rem}
    }
</style>
</head>
<body>
<header class="header">
    <a class="brand" href="/">
        <img src="/images/logo.png" alt="SEOUL ICE">
        <span>SEOUL ICE</span>
    </a>
    <div class="header-actions">
        <a href="/">SHOP</a>
    </div>
</header>

<main class="shell">
    <section class="hero">
        <div class="hero-main">
            <p class="eyebrow">My page</p>
            <h1 id="page-title">마이페이지</h1>
            <div class="hero-actions">
                <button class="hero-logout" type="button" onclick="logout()">로그아웃</button>
                <button class="secondary" type="button" onclick="openProfileEditor()">정보 수정</button>
            </div>
        </div>
        <div class="summary-card">
            <div class="mini-stat"><span>전체 주문</span><strong id="stat-total">0</strong></div>
            <div class="mini-stat"><span>배송중</span><strong id="stat-shipping">0</strong></div>
            <div class="mini-stat"><span>처리중</span><strong id="stat-processing">0</strong></div>
            <div class="mini-stat"><span>배송완료</span><strong id="stat-delivered">0</strong></div>
        </div>
    </section>

    <div class="orders-grid">
        <section class="panel">
            <div class="panel-head">
                <h2>배송중</h2>
                <button class="secondary" type="button" onclick="loadPage()">새로고침</button>
            </div>
            <div class="panel-body">
                <div id="shipping-list" class="stack"></div>
            </div>
        </section>

        <section class="panel">
            <div class="panel-head">
                <h2>최근 주문내역</h2>
                <a class="secondary" href="/mypage/orders" target="_blank" rel="noopener">전체 보기</a>
            </div>
            <div class="panel-body">
                <div id="recent-list" class="stack"></div>
            </div>
        </section>
    </div>

    <div class="logout-row">
        <button class="logout" type="button" onclick="logout()">로그아웃</button>
    </div>
</main>

<div id="profile-modal" class="profile-modal" aria-hidden="true">
    <section class="profile-dialog">
        <div class="profile-dialog-head">
            <h2>정보 수정</h2>
            <button class="profile-close" type="button" onclick="closeProfileEditor()" aria-label="닫기">×</button>
        </div>
        <div class="profile-dialog-body">
            <form id="profile-form">
                <label>이름<input id="profile-name" autocomplete="name"></label>
                <label>연락처<input id="profile-phone" autocomplete="tel"></label>
                <label>배송주소<input id="profile-address" autocomplete="street-address"></label>
                <div class="modal-actions">
                    <button class="secondary" type="button" onclick="closeProfileEditor()">닫기</button>
                    <button class="primary" type="submit">저장</button>
                </div>
            </form>
            <div id="profile-status" class="status"></div>
        </div>
    </section>
</div>

<script>
let profile = { name:"", phone:"", address:"" };
let orders = [];
const money = price => "₩" + Number(price || 0).toLocaleString("ko-KR");
const stages = ["결제완료","상품준비중","배송시작","배송중","배송완료"];

function escapeHtml(value){
    return String(value ?? "").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;");
}

function imageSrc(value){
    return "/" + String(value || "images/logo.png").replace(/^\/+/,"");
}

function normalizeStatus(value){
    const raw = String(value || "주문 처리중").trim();
    const normalized = raw.replace(/\s+/g,"");
    if(normalized === "주문완료" || normalized === "배송완료") return "배송완료";
    if(normalized === "상품준비중") return "상품 준비중";
    if(normalized === "결제완료") return "결제 완료";
    if(normalized === "결제대기중") return "주문 처리중";
    if(normalized === "주문접수") return "주문 처리중";
    return raw;
}

function statusRank(status){
    return ["주문 처리중","결제 완료","상품 준비중","배송시작","배송중","배송완료"].indexOf(status);
}

function canonicalStatus(order){
    const status = normalizeStatus(order.status);
    const shippingStatus = normalizeStatus(order.shippingStatus);
    if(status === "취소" || shippingStatus === "취소") return "취소";
    return statusRank(shippingStatus) > statusRank(status) ? shippingStatus : status;
}

function displayStatus(order){
    const status = canonicalStatus(order);
    if(status === "취소") return "결제 취소";
    return status === "주문 처리중" ? "결제 대기중" : status;
}

function cancelled(order){ return canonicalStatus(order) === "취소"; }
function activeOrder(order){ return ["주문 처리중","결제 완료","상품 준비중","배송시작","배송중"].includes(canonicalStatus(order)); }
function delivered(order){ return canonicalStatus(order) === "배송완료"; }
function processing(order){ return ["주문 처리중","결제 완료","상품 준비중"].includes(canonicalStatus(order)); }

function stageIndex(order){
    const status = canonicalStatus(order);
    if(status === "주문 처리중") return -1;
    if(status === "배송완료") return 4;
    if(status === "배송중") return 3;
    if(status === "배송시작") return 2;
    if(status === "상품 준비중") return 1;
    return 0;
}

async function api(path, options = {}){
    const response = await fetch(path, {
        ...options,
        headers:{ "Content-Type":"application/json", ...(options.headers || {}) }
    });
    const data = await response.json().catch(() => ({}));
    if(!response.ok) throw new Error(data.error || "요청에 실패했습니다.");
    return data;
}

function deliveryFlow(order){
    if(canonicalStatus(order) === "취소") return `<div class="cancelled-flow">결제 취소된 주문입니다.</div>`;
    const activeIndex = stageIndex(order);
    return `
        <div class="delivery-flow">
            <div class="delivery-line">
                ${stages.map((label, index) => `
                    <div class="delivery-step ${index <= activeIndex ? "done" : ""}">
                        <div class="dot">${index <= activeIndex ? "✓" : index + 1}</div>
                        <span>${label}</span>
                    </div>
                `).join("")}
            </div>
        </div>
    `;
}

function orderItems(order){
    return (order.items || []).map(item => `
        <div class="order-item">
            <img src="${escapeHtml(imageSrc(item.image))}" alt="">
            <div>
                <div class="item-name">${escapeHtml(item.name || "상품")}</div>
                <div class="item-option">${escapeHtml(item.selectedOption ? `${item.optionName || "옵션"}: ${item.selectedOption}` : "기본 옵션")}</div>
            </div>
        </div>
    `).join("");
}

function trackingText(order){
    if(canonicalStatus(order) === "취소"){
        return `<strong>현재 현황</strong><span>결제 취소 처리되었습니다.</span>`;
    }
    if(canonicalStatus(order) === "주문 처리중"){
        return `<strong>현재 현황</strong><span>결제 확인 대기중입니다.</span>`;
    }
    if(order.trackingLastDescription || order.trackingLastText){
        const main = order.trackingLastDescription || order.trackingLastText;
        const sub = [
            order.trackingLastLocation ? `위치 ${order.trackingLastLocation}` : "",
            order.trackingLastTime ? `시간 ${order.trackingLastTime}` : "",
            order.trackingEta ? `예상 도착 ${order.trackingEta}` : ""
        ].filter(Boolean).join(" · ");
        return `<strong>현재 현황</strong><span>${escapeHtml(main)}</span>${sub ? `<span>${escapeHtml(sub)}</span>` : ""}`;
    }
    if(order.trackingSyncError) return `<strong>현재 현황</strong><span>${escapeHtml(order.trackingSyncError)}</span>`;
    if(order.trackingNumber) return `<strong>현재 현황</strong><span>${escapeHtml(order.carrierName || order.carrierId)} ${escapeHtml(order.trackingNumber)}</span>`;
    return `<strong>현재 현황</strong><span>운송장번호 등록 전입니다.</span>`;
}

function orderCard(order){
    const status = displayStatus(order);
    return `
        <article class="order-card">
            <div class="order-top">
                <div>
                    <div class="order-title">${escapeHtml(order.id)} <span class="badge">${escapeHtml(status)}</span></div>
                    <div class="order-meta">${new Date(order.createdAt).toLocaleString("ko-KR")}</div>
                </div>
                <div class="order-price">${money(order.total)}</div>
            </div>
            ${deliveryFlow(order)}
            <div class="tracking">${trackingText(order)}</div>
            <div class="order-items">${orderItems(order)}</div>
        </article>
    `;
}

function renderOrders(){
    const activeOrders = orders.filter(activeOrder);
    const historyOrders = orders.filter(order => !activeOrder(order)).slice(0, 5);

    document.getElementById("stat-total").textContent = orders.length;
    document.getElementById("stat-shipping").textContent = activeOrders.length;
    document.getElementById("stat-processing").textContent = orders.filter(processing).length;
    document.getElementById("stat-delivered").textContent = orders.filter(delivered).length;

    document.getElementById("shipping-list").innerHTML = activeOrders.length
        ? activeOrders.map(orderCard).join("")
        : `<div class="empty">진행 중인 주문이 없습니다.</div>`;

    document.getElementById("recent-list").innerHTML = historyOrders.length
        ? historyOrders.map(orderCard).join("")
        : `<div class="empty">최근 주문내역이 없습니다.</div>`;
}

function fillProfile(){
    document.getElementById("profile-name").value = profile.name || "";
    document.getElementById("profile-phone").value = profile.phone || "";
    document.getElementById("profile-address").value = profile.address || "";
    document.getElementById("page-title").textContent = `${profile.name || "회원"}님의 마이페이지`;
}

function openProfileEditor(){
    fillProfile();
    document.getElementById("profile-status").textContent = "";
    document.getElementById("profile-modal").classList.add("active");
    document.getElementById("profile-modal").setAttribute("aria-hidden", "false");
}

function closeProfileEditor(){
    document.getElementById("profile-modal").classList.remove("active");
    document.getElementById("profile-modal").setAttribute("aria-hidden", "true");
}

async function loadPage(){
    const [profileData, orderData] = await Promise.all([
        api("/api/profile"),
        api("/api/my-orders")
    ]);
    profile = profileData.profile || profile;
    orders = (orderData || []).sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt));
    fillProfile();
    renderOrders();
}

document.getElementById("profile-form").addEventListener("submit", async event => {
    event.preventDefault();
    const status = document.getElementById("profile-status");
    status.textContent = "";
    const data = await api("/api/profile", {
        method:"PUT",
        body:JSON.stringify({
            name:document.getElementById("profile-name").value,
            phone:document.getElementById("profile-phone").value,
            address:document.getElementById("profile-address").value
        })
    });
    profile = data.profile || profile;
    fillProfile();
    status.textContent = "저장했습니다.";
    setTimeout(closeProfileEditor, 350);
});

document.getElementById("profile-modal").addEventListener("click", event => {
    if(event.target.id === "profile-modal") closeProfileEditor();
});

async function logout(){
    await fetch("/api/logout", { method:"POST" });
    location.href = "/";
}

loadPage().catch(error => {
    document.getElementById("recent-list").innerHTML = `<div class="empty">${escapeHtml(error.message)}</div>`;
});
</script>
</body>
</html>
