<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SEOUL ICE</title>

<link rel="stylesheet" href="css/style.css">
</head>

<body>

<header>

    <div class="logo">
        <img src="images/logo.png">
        <span>SEOUL ICE</span>
    </div>

    <nav id="nav-menu">
        <a href="#home">HOME</a>
        <a href="#products">COLLECTION</a>
        <a href="#about">BRAND</a>
        <a href="#help">HELP</a>
        <a href="#payment">PAYMENT</a>
    </nav>

    <div class="right-area">
        <div id="cart-btn">
            🛒 <span id="cart-count">0</span>
        </div>

        <div class="menu-toggle" onclick="toggleMenu()">☰</div>
    </div>

</header>
<section id="home" class="section">
    <h1>DAEHO JEWELRY</h1>
    <p class="sub">Luxury Handmade Collection</p>
</section>

<section id="products" class="section">
    <h2>COLLECTION</h2>
    <div id="product-grid"></div>
</section>

<section id="about" class="section">
    <h2>BRAND</h2>
    <p class="sub">정교한 세팅과 타협 없는 퀄리티로 완성된 아이스만이 당신의 일상을 스테이지로 만듭니다.
서울의 트렌디함과 힙합의 역사가 공존하는 SEOUL ICE 만의 럭셔리 바이브를 경험해 보세요.</p>
</section>

<section id="help" class="section">
    <h2>HELP</h2>
    <p class="sub">고객센터 1588-0000</p>
</section>

<section id="payment" class="section">
    <h2>PAYMENT</h2>
    <p class="sub">카드 / 계좌이체 / 간편결제</p>
</section>

<!-- CART -->
<div id="cart-panel">

    <div class="cart-header">
        <h3>장바구니</h3>
    </div>

    <div id="cart-items"></div>

    <div class="cart-footer">

        <p class="total-text">
            총 결제금액<br>
            <span id="total">₩0</span>
        </p>

        <div class="cart-bottom-buttons">
            <button class="buy-btn" onclick="buy()">구매하기</button>
            <button class="back-btn" onclick="closeCart()">뒤로가기</button>
        </div>

    </div>

</div>

<div id="backdrop" onclick="closeCart()"></div>

<script src="js/app.js"></script>

</body>
</html>
