<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>대호 쥬얼리</title>

<link rel="stylesheet" href="css/style.css">
</head>

<body>

<header>
    <div class="logo">
        <img src="images/logo.png">
        <span>대호 쥬얼리</span>
    </div>

    <nav>
        <a href="#home">HOME</a>
        <a href="#products">COLLECTION</a>
        <a href="#about">BRAND</a>
        <a href="#help">HELP</a>
        <a href="#payment">PAYMENT</a>

        <div id="cart-btn">🛒 <span id="cart-count">0</span></div>
    </nav>
</header>

<section id="home" class="section">
    <h1>DAEHO JEWELRY</h1>
    <p class="sub">Luxury Handmade Collection</p>
</section>

<section id="products" class="section">
    <h2>COLLECTION</h2>
    <div id="product-grid"></div>
</section>

<section id="about" class="section">
    <h2>BRAND</h2>
    <p class="sub">대호 쥬얼리 프리미엄 핸드메이드 브랜드</p>
</section>

<section id="help" class="section">
    <h2>HELP</h2>
    <p class="sub">고객센터 1588-0000 / 1:1 문의 가능</p>
</section>

<section id="payment" class="section">
    <h2>PAYMENT</h2>
    <p class="sub">카드 / 계좌이체 / 간편결제 지원</p>
</section>

<!-- CART -->
<div id="cart-panel">
    <div class="cart-header">
        <h3>장바구니</h3>
        <button onclick="closeCart()">✕</button>
    </div>

    <div id="cart-items"></div>

    <div class="cart-footer">
        <p>총액: <span id="total">0</span>원</p>
        <button onclick="buy()">구매하기</button>
        <button onclick="clearCart()">전체삭제</button>
    </div>
</div>

<div class="cart-backdrop" onclick="closeCart()"></div>

<script src="js/app.js"></script>

</body>
</html>
